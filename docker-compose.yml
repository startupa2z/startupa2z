services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: startupa2z
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d startupa2z"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/startupa2z
      PORT: "8080"
    volumes:
      - event_images:/app/static/images
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - default

volumes:
  postgres_data:
  event_images:

networks:
  default:
  coolify:
    external: true
